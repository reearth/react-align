name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: read

jobs:
  create-release-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    # Ensure this workflow only runs from the main branch
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get current version
        id: current_version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Bump version
        id: bump_version
        run: |
          yarn version --${{ github.event.inputs.version }} --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumped version from ${{ steps.current_version.outputs.version }} to $NEW_VERSION"

      - name: Generate changelog
        id: changelog
        run: |
          # Get the latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LATEST_TAG" ]; then
            echo "No previous tag found, generating changelog from first commit"
            COMMIT_RANGE=$(git rev-list --max-parents=0 HEAD)..HEAD
          else
            echo "Latest tag: $LATEST_TAG"
            COMMIT_RANGE=$LATEST_TAG..HEAD
          fi

          # Generate categorized changelog
          FEATURES=$(git log $COMMIT_RANGE --pretty=format:"- %s (%h)" --no-merges --grep="^feat" || echo "")
          FIXES=$(git log $COMMIT_RANGE --pretty=format:"- %s (%h)" --no-merges --grep="^fix" || echo "")
          CHORE=$(git log $COMMIT_RANGE --pretty=format:"- %s (%h)" --no-merges --grep="^chore" || echo "")
          DOCS=$(git log $COMMIT_RANGE --pretty=format:"- %s (%h)" --no-merges --grep="^docs" || echo "")
          OTHER=$(git log $COMMIT_RANGE --pretty=format:"- %s (%h)" --no-merges --invert-grep --grep="^feat\|^fix\|^chore\|^docs" || echo "")

          # Build changelog with sections
          cat > /tmp/changelog.md <<EOF
          ## Changes in v${{ steps.bump_version.outputs.new_version }}

          EOF

          if [ -n "$FEATURES" ]; then
            echo "### ✨ Features" >> /tmp/changelog.md
            echo "" >> /tmp/changelog.md
            echo "$FEATURES" >> /tmp/changelog.md
            echo "" >> /tmp/changelog.md
          fi

          if [ -n "$FIXES" ]; then
            echo "### 🐛 Bug Fixes" >> /tmp/changelog.md
            echo "" >> /tmp/changelog.md
            echo "$FIXES" >> /tmp/changelog.md
            echo "" >> /tmp/changelog.md
          fi

          if [ -n "$CHORE" ]; then
            echo "### 🔧 Chore" >> /tmp/changelog.md
            echo "" >> /tmp/changelog.md
            echo "$CHORE" >> /tmp/changelog.md
            echo "" >> /tmp/changelog.md
          fi

          if [ -n "$DOCS" ]; then
            echo "### 📚 Documentation" >> /tmp/changelog.md
            echo "" >> /tmp/changelog.md
            echo "$DOCS" >> /tmp/changelog.md
            echo "" >> /tmp/changelog.md
          fi

          if [ -n "$OTHER" ]; then
            echo "### 🔨 Other Changes" >> /tmp/changelog.md
            echo "" >> /tmp/changelog.md
            echo "$OTHER" >> /tmp/changelog.md
            echo "" >> /tmp/changelog.md
          fi

          # Output for use in PR
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/changelog.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update CHANGELOG.md
        run: |
          # Create or update CHANGELOG.md
          if [ ! -f CHANGELOG.md ]; then
            echo "# Changelog" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "All notable changes to this project will be documented in this file." >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi

          # Check if this version already exists in the changelog
          if grep -q "## \[v${{ steps.bump_version.outputs.new_version }}\]" CHANGELOG.md; then
            echo "Version v${{ steps.bump_version.outputs.new_version }} already exists in CHANGELOG.md, skipping update"
          else
            # Prepare new entry
            echo "## [v${{ steps.bump_version.outputs.new_version }}] - $(date +%Y-%m-%d)" > /tmp/new_entry.md
            echo "" >> /tmp/new_entry.md
            cat /tmp/changelog.md | tail -n +3 >> /tmp/new_entry.md
            echo "" >> /tmp/new_entry.md

            # Split CHANGELOG into header and content
            awk '/^All notable changes/{print; print ""; exit}' CHANGELOG.md > /tmp/header.md
            awk '/^All notable changes/{found=1; next} found' CHANGELOG.md > /tmp/content.md

            # Rebuild CHANGELOG with new entry inserted
            cat /tmp/header.md /tmp/new_entry.md /tmp/content.md > CHANGELOG.md

            echo "Added v${{ steps.bump_version.outputs.new_version }} to CHANGELOG.md"
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: release/v${{ steps.bump_version.outputs.new_version }}
          commit-message: "chore: bump version to v${{ steps.bump_version.outputs.new_version }}"
          title: "Release v${{ steps.bump_version.outputs.new_version }}"
          body: |
            ## Release v${{ steps.bump_version.outputs.new_version }}

            This PR bumps the version from **v${{ steps.current_version.outputs.version }}** to **v${{ steps.bump_version.outputs.new_version }}**.

            ${{ steps.changelog.outputs.changelog }}

            ---

            ### Release Checklist
            - [ ] Review changelog and version bump
            - [ ] Merge this PR to main
            - [ ] Push the tag `v${{ steps.bump_version.outputs.new_version }}` (`git tag v${{ steps.bump_version.outputs.new_version }} && git push origin v${{ steps.bump_version.outputs.new_version }}`)
            - [ ] Approve the `npm-publish` environment on the resulting Publish workflow run to publish to npm with provenance

            ---
            *This PR was automatically generated by the release workflow*
          labels: |
            release
            automated
